name: Build Windows Installer (Electron)

# Manual trigger, pushes to main, and version tags.
on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Fetch adb + ngrok into bin\win
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin\win | Out-Null
          Invoke-WebRequest "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile pt.zip
          Expand-Archive pt.zip -DestinationPath pt -Force
          Copy-Item pt\platform-tools\adb.exe            bin\win\
          Copy-Item pt\platform-tools\AdbWinApi.dll       bin\win\
          Copy-Item pt\platform-tools\AdbWinUsbApi.dll    bin\win\
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath ngrok -Force
          Copy-Item ngrok\ngrok.exe bin\win\

      - name: Generate icon
        run: python make_icon.py

      - name: Build Python backend (PyInstaller)
        run: python -m PyInstaller --noconfirm --clean Backend.spec

      - name: Build Electron installer
        working-directory: electron
        run: |
          npm install
          npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeviceManager-windows-installer
          path: electron/release/*.exe
          if-no-files-found: error

      - name: Attach installer to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*.exe
